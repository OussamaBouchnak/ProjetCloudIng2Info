<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0ebe0;
      height: 100vh;
      display: flex;
      justify-content: center;
    }

    #chat {
      width: 100%;
      max-width: 700px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fefcf7;
      box-shadow: 0 0 40px rgba(45, 80, 22, 0.08);
    }

    #chat-header {
      background: linear-gradient(135deg, #2d5016, #4a7c28);
      color: #fff;
      padding: 18px 16px;
      text-align: center;
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 1px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      background: #fff;
      border: 1px solid #e8e0d0;
      border-left: 4px solid #e8891a;
      border-radius: 6px;
      padding: 12px 16px;
      word-wrap: break-word;
    }

    .message .username {
      font-weight: 600;
      font-size: 0.9rem;
      color: #3a6b1e;
      margin-bottom: 4px;
    }

    .message .content {
      font-size: 1rem;
      color: #2c1810;
      line-height: 1.4;
    }

    .message .time {
      font-size: 0.75rem;
      color: #c86505;
      margin-top: 6px;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #ddd8cc;
      background: #fefcf7;
    }

    #input-bar input {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #d4ccc0;
      border-radius: 6px;
      outline: none;
      background: #fff;
    }

    #input-bar input:focus {
      border-color: #6a9e3a;
      box-shadow: 0 0 0 3px rgba(74, 124, 40, 0.12);
    }

    #input-bar button {
      padding: 10px 24px;
      font-size: 1rem;
      background: #4a7c28;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    #input-bar button:hover {
      background: #3a6b1e;
    }

    #input-bar button:active {
      background: #2d5016;
    }

    @media (max-width: 720px) {
      #chat {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="chat">
    <div id="chat-header">Chat Of Oussama</div>
    <div id="messages"></div>
    <div id="input-bar">
      <input type="text" id="message-input" placeholder="Type a message..." autofocus>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const API_URL = "http://<ALB_DNS_PLACEHOLDER>"
    let username = prompt("Enter your username:");
    if (!username || !username.trim()) {
      username = "Anonymous";
    }
    username = username.trim();

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    function formatTime(ts) {
      const d = new Date(ts);
      const pad = (n) => String(n).padStart(2, '0');
      return `${pad(d.getHours())}:${pad(d.getMinutes())} ${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
    }

    async function loadMessages() {
      try {
        const res = await fetch(`${API_URL}/messages`);
        if (!res.ok) return;
        const messages = await res.json();
        renderMessages(messages);
      } catch (e) {
        // silent
      }
    }

    function renderMessages(messages) {
      messagesEl.innerHTML = '';
      for (const msg of messages) {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
          <div class="username">${escapeHtml(msg.username)}</div>
          <div class="content">${escapeHtml(msg.content)}</div>
          <div class="time">${formatTime(msg.created_at)}</div>
        `;
        messagesEl.appendChild(div);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;

      try {
        const res = await fetch(`${API_URL}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, content }),
        });
        if (!res.ok) return;
        inputEl.value = '';
        await loadMessages();
      } catch (e) {
        // silent
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    loadMessages();
    setInterval(loadMessages, 3000);
  </script>
</body>
</html>
